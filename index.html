<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VTuberモデル かんたん診断 | Crom Works</title>
<meta name="description" content="VTuberのLive2Dモデル制作を依頼したい初心者向けの無料診断。質問に答えるだけで、必要な素材・おすすめプラン・概算の目安がわかり、そのままCrom Worksに相談できます。">
<style>
  /* ============================================================
     カラーや見た目はここ(:root)の変数を変えるだけで調整できます
     ============================================================ */
  :root{
    --bg1:#f6f3ff;
    --bg2:#fde9f3;
    --card:#ffffff;
    --ink:#2b2440;
    --sub:#6b6480;
    --accent:#8b5cf6;     /* メインカラー(紫) */
    --accent2:#ec4899;    /* アクセント(ピンク) */
    --line:#ece8f5;
    --ok:#16a34a;
    --warn:#d97706;
    --radius:18px;
    --shadow:0 10px 30px rgba(80,50,140,.10);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    font-family:"Hiragino Kaku Gothic ProN","Yu Gothic UI","Meiryo",system-ui,sans-serif;
    color:var(--ink);
    background:linear-gradient(160deg,var(--bg1),var(--bg2));
    background-attachment:fixed;
    line-height:1.7;
    min-height:100vh;
    padding:24px 16px 60px;
  }
  .wrap{max-width:680px;margin:0 auto}

  header.app{ text-align:center; margin-bottom:18px }
  header.app .badge{
    display:inline-block; font-size:12px; letter-spacing:.08em;
    color:var(--accent); background:#fff; border:1px solid var(--line);
    padding:4px 12px; border-radius:999px; margin-bottom:10px;
  }
  header.app h1{ font-size:22px; margin:.2em 0 .1em; }
  header.app p{ color:var(--sub); font-size:13px; margin:.2em 0 0 }

  /* 進捗バー */
  .progress{ height:8px; background:#fff; border-radius:999px; overflow:hidden;
    border:1px solid var(--line); margin:18px 0 6px }
  .progress > i{ display:block; height:100%; width:0;
    background:linear-gradient(90deg,var(--accent),var(--accent2));
    transition:width .35s ease }
  .progress-label{ text-align:right; font-size:12px; color:var(--sub); margin-bottom:14px }

  .card{
    background:var(--card); border:1px solid var(--line);
    border-radius:var(--radius); box-shadow:var(--shadow);
    padding:22px 20px; margin-bottom:16px;
  }

  .q-title{ font-size:19px; font-weight:700; margin:0 0 4px }
  .q-help{ color:var(--sub); font-size:13px; margin:0 0 16px }

  .options{ display:flex; flex-direction:column; gap:10px }
  .opt{
    display:flex; align-items:flex-start; gap:12px;
    width:100%; text-align:left; cursor:pointer;
    background:#fbfaff; border:2px solid var(--line); border-radius:14px;
    padding:14px 16px; font:inherit; color:inherit;
    transition:border-color .15s, background .15s, transform .05s;
  }
  .opt:hover{ border-color:#d6c8ff; background:#f7f3ff }
  .opt:active{ transform:scale(.995) }
  .opt.selected{ border-color:var(--accent); background:#f3edff }
  .opt .mark{
    flex:none; width:22px; height:22px; border-radius:50%;
    border:2px solid #ccc7dd; margin-top:2px; position:relative; transition:.15s;
  }
  .opt.multi .mark{ border-radius:7px }
  .opt.selected .mark{ border-color:var(--accent); background:var(--accent) }
  .opt.selected .mark::after{
    content:""; position:absolute; inset:0; margin:auto;
    width:8px; height:8px; border-radius:2px; background:#fff;
  }
  .opt .label{ font-weight:600 }
  .opt .desc{ display:block; font-weight:400; color:var(--sub); font-size:12.5px; margin-top:2px }

  .nav-row{ display:flex; justify-content:space-between; gap:10px; margin-top:18px }
  button.btn{
    font:inherit; cursor:pointer; border-radius:12px; padding:11px 18px;
    border:1px solid var(--line); background:#fff; color:var(--ink); font-weight:600;
  }
  button.btn:hover{ background:#f7f3ff }
  button.btn.primary{
    border:none; color:#fff;
    background:linear-gradient(90deg,var(--accent),var(--accent2));
  }
  button.btn.primary:disabled{ opacity:.45; cursor:not-allowed }
  button.btn.ghost{ background:transparent }
  a.btn{ text-decoration:none; display:inline-flex; align-items:center }
  .btn.form{ border:none; color:#fff;
    background:linear-gradient(90deg,var(--accent2),#fb7185); }
  .btn.form:hover{ filter:brightness(1.04); background:linear-gradient(90deg,var(--accent2),#fb7185) }
  .btn.big{ padding:14px 22px; font-size:15px }
  .btn.outline{ background:#fff; border:2px solid var(--accent); color:var(--accent) }
  .btn.outline:hover{ background:#f3edff }

  /* ===== おすすめプラン・見積もり ===== */
  .plan-box{ margin-top:18px; border:2px solid #efe7ff; border-radius:16px;
    background:linear-gradient(180deg,#faf7ff,#fdf0f7); padding:18px 16px; text-align:center }
  .plan-label{ display:inline-block; font-size:12px; font-weight:700; color:var(--accent);
    background:#fff; border:1px solid var(--line); border-radius:999px; padding:3px 12px }
  .plan-name{ font-size:20px; font-weight:800; margin-top:10px }
  .plan-price{ font-size:30px; font-weight:800; color:var(--accent2); line-height:1.2; margin:2px 0 6px }
  .plan-price small{ font-size:13px; color:var(--sub); font-weight:600 }
  .plan-note{ font-size:13px; color:var(--sub); margin:0 auto 4px; max-width:460px }
  .est-sub{ font-size:12.5px; font-weight:700; color:var(--ink); margin:14px 0 6px }
  .est-table{ width:100%; border-collapse:collapse; font-size:13px }
  .est-table td{ padding:7px 6px; border-top:1px solid var(--line); text-align:left }
  .est-table td.est-price{ text-align:right; white-space:nowrap; color:var(--accent); font-weight:700 }
  .est-note{ display:block; font-size:11px; color:var(--sub); font-weight:400 }
  .est-total{ margin-top:12px; font-size:15px; font-weight:700 }
  .est-total strong{ font-size:21px; color:var(--accent2); margin-left:8px }
  .plan-tip{ font-size:12.5px; color:var(--ink); background:#fff7ed; border:1px solid #fde6c8;
    border-radius:10px; padding:8px 12px; margin:12px 0 0; text-align:left; line-height:1.7 }
  .est-disc{ font-size:11.5px; color:var(--sub); margin:12px 0 0; line-height:1.7 }

  .trust{ list-style:none; margin:18px 0 0; padding:0; display:flex; flex-direction:column; gap:8px }
  .trust li{ position:relative; padding-left:26px; font-size:13.5px; font-weight:600 }
  .trust li::before{ content:"✓"; position:absolute; left:4px; top:0; color:var(--ok); font-weight:800 }

  .cta-row{ display:flex; gap:10px; flex-wrap:wrap; justify-content:center; margin-top:18px }

  /* ===== 結果 ===== */
  .result-head{ text-align:center; padding:6px 0 2px }
  .result-head .eyebrow{ color:var(--accent); font-size:13px; font-weight:700; letter-spacing:.05em }
  .result-head h2{ font-size:22px; margin:.25em 0 .3em; line-height:1.4 }
  .result-head p{ color:var(--sub); font-size:14px; margin:0 }

  .section{ margin-top:18px }
  .section h3{
    font-size:15px; margin:0 0 10px; display:flex; align-items:center; gap:8px;
    padding-bottom:8px; border-bottom:2px dashed var(--line);
  }
  .section h3 .ic{ font-size:18px }
  ul.list{ margin:0; padding-left:0; list-style:none; display:flex; flex-direction:column; gap:9px }
  ul.list li{ position:relative; padding-left:26px; font-size:14px }
  ul.list li::before{ content:"✓"; position:absolute; left:4px; top:0; color:var(--accent); font-weight:700 }
  ul.list.warn li::before{ content:"!"; color:var(--warn) }

  .tag{ display:inline-block; background:#f3edff; color:var(--accent);
    border-radius:999px; padding:2px 10px; font-size:12px; font-weight:600; margin:2px 4px 2px 0 }

  .req-box{ margin-top:10px }
  textarea#reqText{
    width:100%; min-height:230px; resize:vertical;
    border:1px solid var(--line); border-radius:12px; padding:14px;
    font-family:"SFMono-Regular",Consolas,"Yu Gothic",monospace; font-size:13px;
    line-height:1.7; color:var(--ink); background:#fbfaff;
  }
  .copy-row{ display:flex; gap:10px; align-items:center; margin-top:10px; flex-wrap:wrap }
  .copied{ color:var(--ok); font-size:13px; font-weight:600; opacity:0; transition:.2s }
  .copied.show{ opacity:1 }

  footer.app{ text-align:center; color:var(--sub); font-size:12px; margin-top:24px; line-height:1.8 }
  footer.app a{ color:var(--accent) }

  .hidden{ display:none !important }
  @media (max-width:480px){
    header.app h1{ font-size:19px }
    .q-title{ font-size:17px }
  }
</style>
</head>
<body>
<div class="wrap">

  <header class="app">
    <span class="badge">Crom Works 公式診断</span>
    <h1>VTuberモデル かんたん診断</h1>
    <p>質問に答えるだけで、必要な素材・あなたに合うプラン・<b>概算の目安</b>がわかります。<br>そのまま <a class="js-hp-link" href="#" target="_blank" rel="noopener">Crom Works</a> にご相談いただけます。</p>
  </header>

  <!-- 進捗 -->
  <div id="progressArea">
    <div class="progress"><i id="progressBar"></i></div>
    <div class="progress-label" id="progressLabel"></div>
  </div>

  <!-- 質問エリア(JSが描画) -->
  <div id="app"></div>

  <footer class="app">
    <p>※ 表示金額・診断はあくまで目安です。最終的な料金・納期・著作権などは <a class="js-hp-link" href="#" target="_blank" rel="noopener">Crom Works公式サイト</a> およびお見積もりでご確認ください。</p>
    <p>Presented by Crom Works</p>
  </footer>

</div>

<script>
/* ============================================================================
 *  VTuberモデル制作 診断チェックシート
 *  - 質問は QUESTIONS 配列を編集するだけで増減できます
 *  - when(state) を付けると「前の回答によって出る/出ない」分岐になります
 *  - 結果のロジックは buildResult() にまとまっています
 * ==========================================================================*/

/* ============================================================================
 *  ★ 設定:ここだけ書き換えればOK ★
 * ==========================================================================*/
const FORM_URL   = "https://docs.google.com/forms/d/e/1FAIpQLSe4CBPsDoQNooSHVahxJppxIzhcEP6h-qPbjZb1r-seF2WuQw/viewform"; // 依頼フォーム(空なら「準備中」表示)
const HP_URL     = "https://seracrom.github.io/Crom-works/"; // Crom Works 公式サイト
const GROUP_NAME = "Crom Works"; // グループ名
const yen = n => "¥" + Number(n).toLocaleString("ja-JP"); // 金額表示用ヘルパー
/* ==========================================================================*/

/* ---- 表示用ラベル(値 → 日本語) ----------------------------------------- */
const LABELS = {
  platform:{ youtube:"YouTube", twitch:"Twitch", iriam:"IRIAM",
    mobile:"その他スマホ配信アプリ", pc_other:"その他PC配信", undecided:"まだ決めていない" },
  purpose:{ live:"配信メイン", video:"動画(歌ってみた・実況等)メイン",
    still:"静止画(SNS・サムネ等)メイン", mixed:"いろいろやりたい" },
  motion:{ app_only:"アプリのおまかせ機能で十分", want_l2d:"アプリ以外でもしっかり動かしたい",
    none:"ほぼ動かさなくてOK", light:"軽く動けば十分", normal:"しっかり動かしたい", full:"本格的に動かしたい" },
  art_status:{ none:"まだ無い(イラストから依頼したい)", layered:"レイヤー分けされたPSDがある",
    flat:"1枚絵がある(統合済み・レイヤー無し)", self:"自分で用意する・描ける" },
  range:{ bust:"バストアップ(顔〜胸上)", half:"上半身(腰あたりまで)", full:"全身" },
  budget:{ light:"まずはお試し・控えめ予算", standard:"標準的に",
    rich:"こだわりたい(予算しっかり)", consult:"相談しながら決めたい" },
  diff:{ face:"表情差分", costume:"衣装差分", hair:"髪型差分", hand:"手・小物の差分", none:"おまかせ" },
};

/* ---- 質問の定義 ----------------------------------------------------------- */
const QUESTIONS = [
  {
    id:"platform", type:"single",
    title:"メインで使う予定の場所は?",
    help:"一番よく使う予定のものを選んでください。これで必要なモデルの形が大きく変わります。",
    options:[
      {value:"youtube", label:"YouTube", desc:"PCで配信・動画投稿"},
      {value:"twitch",  label:"Twitch",  desc:"PCでゲーム配信など"},
      {value:"iriam",   label:"IRIAM",   desc:"スマホで、1枚のイラストが自動で動くアプリ"},
      {value:"mobile",  label:"その他スマホ配信アプリ", desc:"ふわっち 等、スマホ中心"},
      {value:"pc_other",label:"その他PC配信", desc:"ニコ生・カスタムキャスト等"},
      {value:"undecided",label:"まだ決めていない", desc:"これから決める / とりあえず作りたい"},
    ],
  },
  {
    id:"purpose", type:"single",
    title:"主な用途はどれに近い?",
    help:"",
    options:[
      {value:"live",  label:"配信メイン", desc:"リアルタイムで喋る・ゲームする"},
      {value:"video", label:"動画メイン", desc:"歌ってみた・実況・編集動画"},
      {value:"still", label:"静止画メイン", desc:"SNS投稿・サムネ・グッズなど"},
      {value:"mixed", label:"いろいろやりたい", desc:"配信も動画も静止画も"},
    ],
  },

  /* 動かし度合い:アプリ自動系(IRIAM/スマホ)用の質問 */
  {
    id:"motion", type:"single",
    when:s=>["iriam","mobile"].includes(s.platform),
    title:"動きはどうしたい?",
    help:"IRIAMなどはイラストを入れるとアプリが自動で動かしてくれます。",
    options:[
      {value:"app_only", label:"アプリのおまかせ機能で十分", desc:"手軽に始めたい。まずはイラストだけでOK"},
      {value:"want_l2d", label:"アプリ以外でもしっかり動かしたい", desc:"将来PC配信や動画もやりたい → Live2Dも視野"},
    ],
  },
  /* 動かし度合い:PC配信・未定 用の質問 */
  {
    id:"motion", type:"single",
    when:s=>!["iriam","mobile"].includes(s.platform),
    title:"どのくらい動かしたい?",
    help:"動かす量が増えるほど、必要なイラストの作り込み(パーツ分け)も増えます。",
    options:[
      {value:"none",   label:"ほぼ動かさなくてOK", desc:"立ち絵・静止画として使えれば十分"},
      {value:"light",  label:"軽く動けば十分", desc:"口パク・まばたき くらい"},
      {value:"normal", label:"しっかり動かしたい", desc:"表情の変化＋髪や体の揺れもの"},
      {value:"full",   label:"本格的に動かしたい", desc:"フルトラッキング・手や指・物理多め"},
    ],
  },

  {
    id:"art_status", type:"single",
    title:"キャラクターのイラストはありますか?",
    help:"Live2Dは「パーツごとに分かれたイラスト(PSD)」が必要です。ここで仕上がりと費用が大きく変わります。",
    options:[
      {value:"none",    label:"まだ無い", desc:"イラストの依頼から相談したい"},
      {value:"layered", label:"ある(レイヤー分けPSD)", desc:"パーツごとに分かれたデータがある"},
      {value:"flat",    label:"ある(1枚絵)", desc:"統合済み・レイヤー無しのイラスト"},
      {value:"self",    label:"自分で用意する", desc:"自分で描く・別で用意する"},
    ],
  },

  {
    id:"range", type:"single",
    title:"画面に映したい範囲は?",
    help:"",
    options:[
      {value:"bust", label:"バストアップ", desc:"顔〜胸上。配信で一番よく使われる"},
      {value:"half", label:"上半身", desc:"腰あたりまで。手も少し見せたい"},
      {value:"full", label:"全身", desc:"全身を見せたい・動画で踊らせたい等"},
    ],
  },

  {
    id:"diff", type:"multi",
    title:"あると嬉しい差分・要素は?(複数選べます)",
    help:"無理に選ばなくてOK。迷ったら「おまかせ」で大丈夫です。",
    options:[
      {value:"face",    label:"表情差分", desc:"笑顔・怒り・泣き・照れ など"},
      {value:"costume", label:"衣装差分", desc:"私服・制服・特別衣装など"},
      {value:"hair",    label:"髪型差分", desc:"結ぶ・下ろす・帽子あり など"},
      {value:"hand",    label:"手・小物の差分", desc:"マイク・飲み物・小道具を持つ"},
      {value:"none",    label:"おまかせ", desc:"特にこだわりはない"},
    ],
  },

  {
    id:"budget", type:"single",
    title:"予算・進め方の希望は?",
    help:"目安です。あとから相談で変えてもOK。",
    options:[
      {value:"light",    label:"まずはお試し", desc:"控えめ予算で小さく始めたい"},
      {value:"standard", label:"標準的に", desc:"一般的な範囲でしっかり作りたい"},
      {value:"rich",     label:"こだわりたい", desc:"予算をかけて理想を追いたい"},
      {value:"consult",  label:"相談しながら", desc:"予算感も含めて相談したい"},
    ],
  },
];

/* ---- 状態管理 ------------------------------------------------------------- */
let state   = {};   // 回答 { id:value または id:[values] }
let history = [];   // 表示・回答した質問idの順番(戻る用)
let cache   = {};   // 戻った時に選択を復元するための一時保存

const $app = document.getElementById("app");

function visibleAndUnanswered(){
  for(const q of QUESTIONS){
    if(q.when && !q.when(state)) continue;
    if(state[q.id] === undefined) return q;
  }
  return null; // 全部終わった
}

function render(){
  const q = visibleAndUnanswered();
  if(!q){ renderResult(); return; }
  drawQuestion(q);
  updateProgress();
}

function updateProgress(){
  // 現在の回答状況からおおよその進捗を出す
  const visible = QUESTIONS.filter(q=>!q.when || q.when(state));
  const answered = visible.filter(q=>state[q.id] !== undefined).length;
  const total = visible.length;
  const pct = Math.round((answered / total) * 100);
  document.getElementById("progressBar").style.width = pct + "%";
  document.getElementById("progressLabel").textContent = `質問 ${answered+1} / ${total}`;
}

function drawQuestion(q){
  const isMulti = q.type === "multi";
  const pre = cache[q.id]; // 戻った時の復元
  const selected = isMulti ? (Array.isArray(pre)?pre.slice():[]) : (pre ?? null);

  const optsHtml = q.options.map(o=>{
    const on = isMulti ? selected.includes(o.value) : selected === o.value;
    return `<button class="opt ${isMulti?'multi':''} ${on?'selected':''}" data-v="${o.value}">
        <span class="mark"></span>
        <span><span class="label">${o.label}</span>
        ${o.desc?`<span class="desc">${o.desc}</span>`:""}</span>
      </button>`;
  }).join("");

  $app.innerHTML = `
    <div class="card">
      <p class="q-title">${q.title}</p>
      ${q.help?`<p class="q-help">${q.help}</p>`:""}
      <div class="options">${optsHtml}</div>
      <div class="nav-row">
        <button class="btn ghost" id="backBtn" ${history.length===0?'style="visibility:hidden"':""}>← 戻る</button>
        ${isMulti?`<button class="btn primary" id="nextBtn" ${selected.length?"":"disabled"}>次へ →</button>`:`<span></span>`}
      </div>
    </div>`;

  // 選択肢クリック
  $app.querySelectorAll(".opt").forEach(btn=>{
    btn.addEventListener("click", ()=>{
      const v = btn.dataset.v;
      if(isMulti){
        let arr = selected;
        if(v === "none"){
          arr = arr.includes("none") ? [] : ["none"];          // 「おまかせ」は単独
        }else{
          arr = arr.filter(x=>x!=="none");                      // 他を選んだら「おまかせ」解除
          arr = arr.includes(v) ? arr.filter(x=>x!==v) : [...arr, v];
        }
        cache[q.id] = arr;
        drawQuestion(q); // 再描画して選択状態を反映
      }else{
        cache[q.id] = v;
        commit(q.id, v);
      }
    });
  });

  // 戻る
  const back = document.getElementById("backBtn");
  if(back) back.addEventListener("click", goBack);

  // 次へ(複数選択用)
  const next = document.getElementById("nextBtn");
  if(next) next.addEventListener("click", ()=>{
    const arr = cache[q.id] || [];
    if(arr.length) commit(q.id, arr.slice());
  });
}

function commit(id, value){
  state[id] = value;
  history.push(id);
  render();
}

function goBack(){
  const last = history.pop();
  if(last !== undefined) delete state[last];
  // それ以降の枝の回答も念のためクリア(分岐が変わる可能性に備える)
  render();
}

/* ============================================================================
 *  結果のロジック
 * ==========================================================================*/
/* ----------------------------------------------------------------------------
 *  簡易見積もり:診断内容を Crom Works の料金表にあてはめて概算を出す
 *  ※ 料金を変えたいときは、この関数内の数字(base / price)を書き換えてください
 * --------------------------------------------------------------------------*/
function buildEstimate(s, ctx){
  const { degree, needL2d, appAuto, diffs } = ctx;
  const hasLayered = s.art_status === "layered"; // パーツ分けPSDを既に持っている
  let plan, base, planNote;

  if(!needL2d){
    // 動かさない → イラストのみ
    if(appAuto){
      plan = "Live2D用イラスト(パーツ分け)";
      base = 130000;
      planNote = "IRIAM等はイラスト主体。三面図や表情差分まで揃える『Vtuberお試しセット(¥150,000〜)』もおすすめです。";
    }else{
      plan = "Vtuberお試しセット";
      base = 150000;
      planNote = "全身立ち絵(パーツ分け)＋三面図＋キービジュアル(表情差分3種)のイラスト一式。Live2Dは含みません。";
    }
  }else if(hasLayered){
    // イラスト支給あり → Live2Dモデリングのみ
    if(degree >= 3){
      plan = "Live2Dモデリング＋";
      base = 220000;
      planNote = "豊富な表情(パーフェクトシンク)・表情差分4種・体の位置XYまで対応。お持ちのパーツ分けPSDを使用します。";
    }else{
      plan = "基本Live2Dモデリング";
      base = 160000;
      planNote = "基本表情・動作・物理演算。お持ちのパーツ分けPSDを使用。VTubeStudio／Nizimaの設定は無料です。";
    }
  }else{
    // イラストもLive2Dも必要 → セットプラン
    if(degree >= 3 || s.budget === "rich"){
      plan = "フルセット";
      base = 345000;
      planNote = "全身立ち絵＋衣装差分4種＋基本Live2Dモデリング＋三面図＋キービジュアル＋一枚絵(背景あり)。一番人気の充実プラン。";
    }else{
      plan = "基本セット";
      base = 275000;
      planNote = "全身立ち絵＋衣装差分4種＋基本Live2Dモデリング。イラストからLive2Dまで一括のスタンダード。";
    }
  }

  // 追加で考えられるオプション(目安)
  const items = [];
  if(needL2d && degree >= 3 && s.range === "full"){
    items.push({ name:"全身アニメーション(歩き等)", price:20000, note:"" });
  }
  if(needL2d && diffs.includes("hand")){
    items.push({ name:"一部アニメーション(手を振る等)", price:10000, note:"" });
  }
  if(hasLayered && diffs.includes("face") && degree < 3){
    items.push({ name:"表情差分の追加", price:5000, note:"1差分あたり" });
  }
  if(hasLayered && diffs.includes("costume")){
    items.push({ name:"衣装差分(別途イラスト)", price:80000, note:"1差分あたり・要相談" });
  }

  const totalMin = base + items.reduce((a,b)=>a + b.price, 0);

  // 予算控えめだがイラスト＋Live2Dが必要な人への一言
  let tip = "";
  if(!hasLayered && needL2d && s.budget === "light"){
    tip = "予算を抑えたいなら、まずイラストのみ(Vtuberお試しセット ¥150,000〜)から始めて、後でLive2D化することもできます。";
  }

  return { plan, base, planNote, items, totalMin, tip };
}

function buildResult(s){
  const appAuto = ["iriam","mobile"].includes(s.platform);
  const m = s.motion;

  // Live2Dの度合い(0=不要, 1=簡易, 2=標準, 3=本格)
  let degree = 0;
  if(appAuto){
    degree = (m === "want_l2d") ? 2 : 0;
  }else{
    degree = ({none:0, light:1, normal:2, full:3})[m] ?? 0;
  }
  const needL2d = degree >= 1;

  // ---- おすすめ構成タイトル ----
  let eyebrow = "あなたへのおすすめ";
  let title, summary;
  if(appAuto && degree === 0){
    title = "アプリ用イラスト(自動で動くタイプ)";
    summary = `${LABELS.platform[s.platform]} はイラストを入れるとアプリ側が自動で動かしてくれます。まずは規格に合ったイラスト1枚から始めるのがおすすめ。フルLive2Dモデルは必須ではありません。`;
  }else if(appAuto && degree >= 1){
    title = "アプリ用イラスト ＋ 別途Live2Dモデル";
    summary = `アプリでは自動の動きで手軽に。加えてPC配信・動画用に、しっかり動くLive2Dモデルを用意する構成です。`;
  }else if(degree === 0){
    title = "立ち絵イラスト(動かさないタイプ)";
    summary = `まずは魅力的な立ち絵があればOK。後から「やっぱり動かしたい」となった時に備え、レイヤー分けして残しておくと安心です。`;
  }else if(degree === 1){
    title = "簡易Live2Dモデル";
    summary = `口パク・まばたき中心の、軽快に動くモデル。費用と手間を抑えつつ「動くVTuber」を始められます。`;
  }else if(degree === 2){
    title = "標準的なLive2Dモデル";
    summary = `表情の変化に加え、髪や体の揺れものまで。配信VTuberとして一番イメージしやすい王道の構成です。`;
  }else{
    title = "本格Live2Dモデル(フルトラッキング対応)";
    summary = `手や指・細かな表情・物理演算まで作り込む、表現力重視の構成。素材の準備もいちばん丁寧さが求められます。`;
  }

  // ---- 必要な素材 ----
  const materials = [];
  materials.push("キャラクターのイラスト本体");

  if(appAuto){
    materials.push("アプリ公式が指定する <b>サイズ・形式</b>(必ず最新の公式ガイドラインを確認)");
    materials.push("背景が<b>透過</b>されたイラスト");
    materials.push("顔がはっきり見える、縦向き構図がおすすめ");
    if(s.platform === "iriam"){
      materials.push("IRIAMは<b>パーツ分け(レイヤー分け)</b>があると自動の動きがより自然になります");
    }
  }
  if(needL2d){
    materials.push("<b>PSD形式(.psd)</b> で、パーツごとに<b>レイヤー分け</b>されたイラスト");
    materials.push("動かすパーツは<b>隠れている部分まで描く</b>(閉じた時のまぶた裏・口の中・前髪の下の輪郭 など)");
    materials.push("レイヤー名・グループ名を分かりやすく(髪/目/口/眉/顔/体/服…)");
    materials.push("推奨解像度:配信用なら長辺<b>4000px前後</b>(大きい分には後で縮小できます)");
    if(degree >= 2){
      materials.push("揺らしたいパーツ(髪・服のすそ・アクセサリー等)は<b>独立したレイヤー</b>に");
    }
    if(degree >= 3){
      materials.push("手・指や、見せたい角度(横顔など)の<b>参考</b>。フルトラ用に細かいパーツ分け");
    }
  }
  if(!appAuto && degree === 0){
    materials.push("(将来動かす可能性があるなら、今のうちにレイヤー分けPSDで保存推奨)");
  }

  const diffs = Array.isArray(s.diff) ? s.diff.filter(d=>d!=="none") : [];

  // ---- 活動するうえで便利なイラスト・素材 ----
  const activityAssets = [];
  activityAssets.push("SNS用アイコン・ヘッダー画像(X / YouTube など)");
  activityAssets.push("ロゴ・ワンポイントマーク");
  if(["live","mixed"].includes(s.purpose) || ["youtube","twitch","pc_other","undecided"].includes(s.platform)){
    activityAssets.push("配信画面まわり:開始 / 待機 / 休憩 / 終了 の各画面");
    activityAssets.push("配信枠のフレーム・オーバーレイ");
  }
  if(["video","still","mixed"].includes(s.purpose)){
    activityAssets.push("サムネイル用の立ち絵・表情・ポーズ");
  }
  if(s.platform === "twitch" || s.purpose === "mixed"){
    activityAssets.push("エモート / スタンプ(Twitch・Discord 等で使える表情アイコン)");
  }
  if(s.budget === "rich" || s.purpose === "still"){
    activityAssets.push("グッズ展開用のイラスト(アクスタ・缶バッジ など)");
  }
  activityAssets.push("リアクション用の表情差分(配信を盛り上げる笑顔・驚き など)");

  // ---- 依頼するときにあると便利な情報 ----
  const requestInfo = [];
  requestInfo.push("設定資料:三面図 / 配色指定 / 身長・体型 / 性格メモ(あると制作がスムーズ)");
  requestInfo.push("なりたい雰囲気(かわいい/かっこいい/クール 等)や、参考画像・好きなVTuberの例");
  if(diffs.includes("face"))    requestInfo.push("ほしい表情差分を具体的に(例:笑顔・泣き・ジト目・驚き)");
  if(diffs.includes("costume")) requestInfo.push("ほしい衣装差分の内容(私服・制服・季節衣装 など)");
  if(diffs.includes("hair"))    requestInfo.push("ほしい髪型差分(結ぶ / 下ろす / 帽子あり など)");
  if(diffs.includes("hand"))    requestInfo.push("手・小物のイメージ(マイク・飲み物・小道具 など)");
  if(s.range === "full")        requestInfo.push("全身の場合、靴・足元のデザイン希望");
  requestInfo.push("予算の上限・希望納期があれば明確に伝える");

  // ---- 注意点 ----
  const notes = [];
  if(s.art_status === "flat" && needL2d){
    notes.push("統合済みの1枚絵は、そのままだとLive2D化が難しく、<b>追加のパーツ分け作業(費用・納期アップ)</b>になりがち。可能ならレイヤー分けされた元データを用意するか、レイヤー分けOKの絵師さんへ。");
  }
  if(s.art_status === "none" && needL2d){
    notes.push("イラストを絵師さんに頼む時は、<b>「Live2D化が前提です」と必ず伝える</b>こと。パーツ分けの可否で仕上がりが大きく変わります。");
  }
  if(appAuto && degree === 0){
    notes.push("この使い方ならフルLive2Dモデルは必須ではありません。まずはアプリ規格のイラストから気軽に始められます。");
  }
  if(s.platform === "undecided"){
    notes.push("プラットフォームが決まると必要なスペックが固まります。PC配信(YouTube/Twitch)前提なら、Live2D＋トラッキングソフト(VTube Studio 等)が一般的です。");
  }
  notes.push("依頼時は <b>商用利用の可否・著作権/二次利用の範囲・修正回数・納期・料金</b> を必ず確認しましょう。");

  // ---- 簡易見積もり(Crom Works 料金表ベース) ----
  const estimate = buildEstimate(s, { degree, needL2d, appAuto, diffs });

  // ---- 依頼文テンプレート(Googleフォーム貼り付け用) ----
  const L = LABELS;
  const diffText = diffs.length ? diffs.map(d=>L.diff[d]).join("、") : "おまかせ";
  const req =
`VTuberモデル制作のご依頼です。
診断チェックシートで希望を整理しました。下記の内容でご相談・お見積もりをお願いします。

■ 使う予定の場所 : ${L.platform[s.platform]}
■ 主な用途       : ${L.purpose[s.purpose]}
■ 動かしたい度合い : ${L.motion[s.motion] ?? "未選択"}
■ 希望する構成   : ${title}
■ イラストの状況  : ${L.art_status[s.art_status]}
■ 映したい範囲   : ${L.range[s.range]}
■ ほしい差分     : ${diffText}
■ 予算・進め方   : ${L.budget[s.budget]}
■ 希望プラン(目安) : ${estimate.plan}(${yen(estimate.base)}〜)
■ 概算の目安     : ${yen(estimate.totalMin)}〜(税込・あくまで目安)

■ 補足・ご要望(自由にご記入ください)


────────────
※この依頼内容は診断チェックシートで作成しました。`;

  return { eyebrow, title, summary, materials, activityAssets, requestInfo, notes, estimate, requestText:req };
}

function renderResult(){
  const r = buildResult(state);
  document.getElementById("progressArea").classList.add("hidden");

  const li = (arr, cls="") => `<ul class="list ${cls}">${arr.map(x=>`<li>${x}</li>`).join("")}</ul>`;

  const e = r.estimate;
  const estItems = e.items.length
    ? `<p class="est-sub">追加で考えられるオプション(目安)</p>
       <table class="est-table"><tbody>${e.items.map(it=>`<tr><td>${it.name}${it.note?`<span class="est-note">${it.note}</span>`:""}</td><td class="est-price">+${yen(it.price)}〜</td></tr>`).join("")}</tbody></table>`
    : "";
  const formCta = FORM_URL
    ? `<a class="btn primary big" href="${FORM_URL}" target="_blank" rel="noopener">この内容でCrom Worksに相談する ↗</a>`
    : `<button class="btn primary big" id="formBtnTop">この内容でCrom Worksに相談する ↗</button>`;
  const formBtnReq = FORM_URL
    ? `<a class="btn form" href="${FORM_URL}" target="_blank" rel="noopener">依頼フォームを開く ↗</a>`
    : `<button class="btn form" id="formBtn">依頼フォームを開く ↗</button>`;

  $app.innerHTML = `
    <div class="card">
      <div class="result-head">
        <span class="eyebrow">${r.eyebrow}</span>
        <h2>${r.title}</h2>
        <p>${r.summary}</p>
      </div>

      <div class="plan-box">
        <span class="plan-label">あなたにおすすめのプラン</span>
        <div class="plan-name">${e.plan}</div>
        <div class="plan-price">${yen(e.base)}<small>〜（税込）</small></div>
        <p class="plan-note">${e.planNote}</p>
        ${estItems}
        <div class="est-total">概算の目安<strong>${yen(e.totalMin)}〜</strong></div>
        ${e.tip ? `<p class="plan-tip">💡 ${e.tip}</p>` : ""}
        <p class="est-disc">※ デザインの複雑さ・作業量で変動します。正式な金額はフォームからお気軽にどうぞ(相談無料・1〜3営業日で返信)。</p>
      </div>

      <ul class="trust">
        <li>現役VTuber兼Live2Dモデラー監修のクオリティ</li>
        <li>イラストからLive2Dまで、窓口ひとつで一括依頼OK</li>
        <li>VTubeStudio・Nizima の設定・セットアップは無料</li>
        <li>初めてでも安心。まだイメージだけのご相談でも大丈夫です</li>
      </ul>

      <div class="cta-row">
        ${formCta}
        <a class="btn outline" href="${HP_URL}" target="_blank" rel="noopener">Crom Works公式サイトを見る</a>
      </div>
    </div>

    <div class="card">
      <div class="section" style="margin-top:0">
        <h3><span class="ic">🧩</span>必要な素材</h3>
        ${li(r.materials)}
      </div>
      <div class="section">
        <h3><span class="ic">✨</span>活動するうえで便利なイラスト・素材</h3>
        ${li(r.activityAssets)}
      </div>
      <div class="section">
        <h3><span class="ic">📝</span>依頼するときにあると便利な情報</h3>
        ${li(r.requestInfo)}
      </div>
      <div class="section">
        <h3><span class="ic">⚠️</span>気をつけたいこと</h3>
        ${li(r.notes, "warn")}
      </div>
    </div>

    <div class="card">
      <div class="section" style="margin-top:0">
        <h3><span class="ic">📋</span>そのまま使える依頼文</h3>
        <p class="q-help">下の内容をコピーして「依頼フォームを開く」または<a class="js-hp-link" href="${HP_URL}" target="_blank" rel="noopener">Crom Works公式サイト</a>のご依頼フォームから貼り付けてください。補足・ご要望の追記もおすすめです。</p>
        <div class="req-box">
          <textarea id="reqText" spellcheck="false">${r.requestText.replace(/</g,"&lt;")}</textarea>
          <div class="copy-row">
            <button class="btn primary" id="copyBtn">依頼内容をコピー</button>
            ${formBtnReq}
            <button class="btn" id="restartBtn">もう一度診断する</button>
            <span class="copied" id="copied">コピーしました！</span>
          </div>
          <p class="q-help" style="margin-top:10px">コピーした内容を、依頼フォームの「ご要望」欄などに貼り付けてください。</p>
        </div>
      </div>
    </div>`;

  document.getElementById("copyBtn").addEventListener("click", async ()=>{
    const text = document.getElementById("reqText").value;
    try{ await navigator.clipboard.writeText(text); }
    catch(e){ const t=document.getElementById("reqText"); t.select(); document.execCommand("copy"); }
    const c = document.getElementById("copied");
    c.classList.add("show"); setTimeout(()=>c.classList.remove("show"), 1600);
  });

  // FORM_URL未設定のときだけ存在するフォールバック用ボタン
  ["formBtn","formBtnTop"].forEach(id=>{
    const b = document.getElementById(id);
    if(b) b.addEventListener("click", ()=>{
      alert("依頼フォームのリンクが設定されていません。\nindex.html 先頭の FORM_URL にURLを貼ってください。");
    });
  });

  document.getElementById("restartBtn").addEventListener("click", ()=>{
    state={}; history=[]; cache={};
    document.getElementById("progressArea").classList.remove("hidden");
    window.scrollTo({top:0, behavior:"smooth"});
    render();
  });

  window.scrollTo({top:0, behavior:"smooth"});
}

/* ---- 起動 ---- */
// ヘッダー・フッターの「Crom Works」リンクに HP_URL を反映(結果画面のリンクはJS描画時に設定済み)
document.querySelectorAll(".js-hp-link").forEach(a=>{ if(HP_URL) a.href = HP_URL; });
render();
</script>
</body>
</html>
